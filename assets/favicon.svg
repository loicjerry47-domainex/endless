<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#f5c97a" stop-opacity="1"/>
      <stop offset="55%" stop-color="#e88a4a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#07060a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#f4ecdc" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f5c97a" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#07060a"/>
  <circle cx="32" cy="32" r="22" fill="url(#g)">
    <animate attributeName="r" values="20;26;20" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="32" r="6" fill="url(#core)">
    <animate attributeName="r" values="5;8;5" dur="4.5s" repeatCount="indefinite"/>
  </circle>
</svg>
