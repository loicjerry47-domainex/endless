<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>endlessly</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #07060a;
    --ink: #f4ecdc;
    --warm: #f5c97a;
    --ember: #e88a4a;
    --dim: rgba(244, 236, 220, 0.42);
    --faint: rgba(244, 236, 220, 0.14);
    --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --serif: "Cormorant Garamond", Iowan Old Style, Georgia, serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--ink); }
  body { font-family: var(--mono); cursor: crosshair; }

  canvas { position: fixed; inset: 0; display: block; }

  .ui {
    position: fixed; inset: 0;
    pointer-events: none;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 32px 36px;
  }

  .top, .bottom {
    display: flex; justify-content: space-between; align-items: flex-start;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--dim);
    line-height: 1.8;
  }

  .breath-label {
    color: var(--ink);
    transition: opacity 600ms ease;
    min-width: 12ch;
  }

  .verse {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    text-align: center;
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    color: var(--ink);
    opacity: 0;
    transition: opacity 2.4s ease;
    text-shadow: 0 0 30px rgba(7, 6, 10, 0.6);
    max-width: 80vw;
    line-height: 1.3;
  }
  .verse.l1 { font-size: clamp(28px, 5vw, 64px); }
  .verse.show { opacity: 0.92; }

  .float-text {
    position: absolute;
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    color: var(--ink);
    pointer-events: none;
    white-space: nowrap;
    will-change: transform, opacity;
    text-shadow: 0 0 20px rgba(7, 6, 10, 0.7);
  }

  .hint {
    text-align: right;
  }

  .breath-meter {
    position: fixed;
    left: 50%; bottom: 32px;
    transform: translateX(-50%);
    width: 220px; height: 1px;
    background: var(--faint);
    pointer-events: none;
  }
  .breath-meter::after {
    content: '';
    position: absolute; left: 50%; top: -3px;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--ink);
    box-shadow: 0 0 12px var(--warm);
    transform: translate(-50%, 0);
  }

  .corner {
    font-variant-numeric: tabular-nums;
  }

  @media (max-width: 640px) {
    .ui { padding: 18px; }
    .top, .bottom { font-size: 9px; letter-spacing: 0.15em; }
  }
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="floats"></div>

  <h1 class="verse l1" id="verse">the hello already carries the goodbye</h1>

  <div class="ui">
    <div class="top">
      <div>
        <div>endlessly &nbsp;·&nbsp; a single breath</div>
        <div style="opacity: 0.55; margin-top: 2px;">drag · click · hold</div>
      </div>
      <div class="corner" id="cycleCount">cycle 001</div>
    </div>

    <div class="bottom">
      <div class="breath-label" id="breathLabel">inhale &mdash; hello</div>
      <div class="hint">the seed and the harvest<br/>are the same light</div>
    </div>
  </div>

  <div class="breath-meter" id="meter"></div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H, DPR = Math.min(window.devicePixelRatio || 1, 2);
  function resize() {
    W = innerWidth; H = innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resize();
  addEventListener('resize', resize);

  // ---------- particle system ----------
  const N = 380;
  const ps = [];
  for (let i = 0; i < N; i++) {
    const a = Math.random() * Math.PI * 2;
    ps.push({
      x: Math.cos(a) * 4, y: Math.sin(a) * 4,
      vx: 0, vy: 0,
      tx: 0, ty: 0,
      seed: Math.random(),
      a0: a,
      hue: Math.random(),
      size: 0.5 + Math.random() * 1.4,
      phase: Math.random() * Math.PI * 2,
      // each particle has its own "memory" of past — cumulative
      mass: 0.4 + Math.random() * 0.6,
    });
  }

  // ---------- breath cycle ----------
  // 0..1 cycle. inhale 0..0.18 = compressed seed (hello)
  //              exhale 0.18..0.55 = expanding (between)
  //              gather 0.55..0.85 = harvesting (goodbye)
  //              fold   0.85..1.00 = collapse back to seed
  const PERIOD = 18000; // ms — breath length
  let startTime = performance.now();
  let pausedAt = null;
  let pauseOffset = 0;
  let cycleCount = 1;
  let lastCycle = 0;

  // mouse
  let mx = 0, my = 0, mouseActive = false, holding = false;
  addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; mouseActive = true; });
  addEventListener('mouseleave', () => { mouseActive = false; });
  addEventListener('mousedown', () => { holding = true; pausedAt = performance.now(); });
  addEventListener('mouseup', () => {
    if (holding && pausedAt != null) {
      pauseOffset += performance.now() - pausedAt;
      pausedAt = null;
    }
    holding = false;
  });
  addEventListener('touchstart', e => { holding = true; pausedAt = performance.now(); const t = e.touches[0]; mx = t.clientX; my = t.clientY; mouseActive = true; }, { passive: true });
  addEventListener('touchmove', e => { const t = e.touches[0]; mx = t.clientX; my = t.clientY; }, { passive: true });
  addEventListener('touchend', () => {
    if (holding && pausedAt != null) {
      pauseOffset += performance.now() - pausedAt;
      pausedAt = null;
    }
    holding = false;
    mouseActive = false;
  });

  function getPhase(now) {
    const t = (holding ? pausedAt : now) - startTime - pauseOffset;
    return ((t % PERIOD) / PERIOD + 1) % 1;
  }
  function getCycleIndex(now) {
    const t = (holding ? pausedAt : now) - startTime - pauseOffset;
    return Math.floor(t / PERIOD) + 1;
  }

  // smooth easing — breath is not linear
  function ease(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }

  // ---------- target geometry by phase ----------
  function setTargets(phase, now) {
    const cx = W / 2, cy = H / 2;
    const R = Math.min(W, H);

    // breath value: 0 = compressed, 1 = fully expanded
    let breath;
    if (phase < 0.18) {
      // hello — held breath, slight micro-pulse
      breath = 0.04 + Math.sin(now * 0.002) * 0.02;
    } else if (phase < 0.55) {
      // exhale into between
      const u = (phase - 0.18) / 0.37;
      breath = ease(u) * 1.0;
    } else if (phase < 0.85) {
      // gather toward goodbye — still wide but condensing
      const u = (phase - 0.55) / 0.30;
      breath = 1.0 - ease(u) * 0.55; // settles to ~0.45
    } else {
      // fold back into seed
      const u = (phase - 0.85) / 0.15;
      breath = 0.45 - ease(u) * 0.41; // back to ~0.04
    }

    // warmth (used by render)
    let warmth;
    if (phase < 0.18) warmth = 0.85; // hello already heavy & warm
    else if (phase < 0.55) warmth = 0.85 - (phase - 0.18) / 0.37 * 0.7; // cools as it spreads
    else if (phase < 0.85) warmth = 0.15 + (phase - 0.55) / 0.30 * 0.85; // re-warms gathering
    else warmth = 1.0;

    // rotation drifts, reverses each breath
    const rot = Math.sin(now * 0.0001) * 0.6;

    for (let i = 0; i < N; i++) {
      const p = ps[i];
      const baseAngle = p.a0 + rot * (0.5 + p.seed);
      // radius scales with breath; particles further out at full exhale
      const radius = (0.04 + p.seed * 0.55) * R * 0.55 * (0.06 + breath * 0.95);
      // wobble grows in between phase
      const wob = breath * (Math.sin(now * 0.0007 + p.phase) * 14 + Math.cos(now * 0.00045 + p.phase * 1.3) * 10);
      p.tx = cx + Math.cos(baseAngle) * radius + wob;
      p.ty = cy + Math.sin(baseAngle) * radius * 0.88 + wob * 0.6;

      // mouse pull
      if (mouseActive) {
        const dx = mx - p.x, dy = my - p.y;
        const d2 = dx * dx + dy * dy;
        const pull = Math.min(120, 8000 / (d2 + 200));
        p.tx += dx / Math.sqrt(d2 + 1) * pull * 0.5;
        p.ty += dy / Math.sqrt(d2 + 1) * pull * 0.5;
      }
    }

    return { breath, warmth };
  }

  function lerpCol(t) {
    // ink → warm → ember
    const ink = [244, 236, 220];
    const warm = [245, 201, 122];
    const ember = [232, 138, 74];
    if (t < 0.5) {
      const u = t / 0.5;
      return [
        ink[0] + (warm[0] - ink[0]) * u,
        ink[1] + (warm[1] - ink[1]) * u,
        ink[2] + (warm[2] - ink[2]) * u,
      ];
    } else {
      const u = (t - 0.5) / 0.5;
      return [
        warm[0] + (ember[0] - warm[0]) * u,
        warm[1] + (ember[1] - warm[1]) * u,
        warm[2] + (ember[2] - warm[2]) * u,
      ];
    }
  }

  // ---------- render ----------
  function frame(now) {
    const phase = getPhase(now);
    const { breath, warmth } = setTargets(phase, now);

    // trailing fade — slower fade in compressed phases for ghostly trails
    const fadeAlpha = 0.10 + (1 - breath) * 0.08;
    ctx.fillStyle = `rgba(7, 6, 10, ${fadeAlpha})`;
    ctx.fillRect(0, 0, W, H);

    // damp toward targets
    for (let i = 0; i < N; i++) {
      const p = ps[i];
      p.vx = p.vx * 0.88 + (p.tx - p.x) * 0.014;
      p.vy = p.vy * 0.88 + (p.ty - p.y) * 0.014;
      p.x += p.vx; p.y += p.vy;
    }

    // connections during expansion phase
    if (phase > 0.22 && phase < 0.78) {
      const conStrength = phase < 0.5 ? (phase - 0.22) / 0.28 : (0.78 - phase) / 0.28;
      const maxD2 = 11000;
      ctx.lineWidth = 0.4;
      for (let i = 0; i < N; i++) {
        const a = ps[i];
        for (let j = i + 1; j < i + 16 && j < N; j++) {
          const b = ps[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < maxD2) {
            const alpha = (1 - d2 / maxD2) * 0.18 * conStrength;
            ctx.strokeStyle = `rgba(244, 236, 220, ${alpha})`;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }
    }

    // particles
    for (let i = 0; i < N; i++) {
      const p = ps[i];
      const w = warmth * (0.6 + p.hue * 0.4);
      const [r, g, b] = lerpCol(Math.min(1, w));
      const sizeMul = 0.7 + (1 - breath) * 0.7; // bigger when compressed
      const size = p.size * sizeMul;
      const alpha = 0.5 + (1 - breath) * 0.4 + p.hue * 0.15;

      // halo on compressed phases (hello & goodbye)
      if (breath < 0.35) {
        const haloA = (0.35 - breath) * 0.18;
        ctx.fillStyle = `rgba(${r|0}, ${g|0}, ${b|0}, ${haloA})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, size * (5 + (0.35 - breath) * 14), 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = `rgba(${r|0}, ${g|0}, ${b|0}, ${Math.min(1, alpha)})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
      ctx.fill();
    }

    // breath meter dot
    const meter = document.getElementById('meter');
    if (meter) {
      // map phase 0..1 to meter position with easing emphasis on compressed states
      meter.style.setProperty('--p', phase);
      const x = (phase) * 220;
      meter.querySelector ? null : null; // placeholder
    }

    // update breath label
    updateLabel(phase);

    // cycle counter + verse trigger
    const cIdx = getCycleIndex(now);
    if (cIdx !== lastCycle) {
      lastCycle = cIdx;
      cycleCount = cIdx;
      document.getElementById('cycleCount').textContent = `cycle ${String(cIdx).padStart(3, '0')}`;
      maybeFloat();
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ---------- breath label + verse ----------
  const labels = [
    { upTo: 0.18, text: 'inhale &mdash; hello' },
    { upTo: 0.55, text: 'exhale &mdash; the in between' },
    { upTo: 0.85, text: 'gather &mdash; the harvest' },
    { upTo: 1.0,  text: 'fold &mdash; goodbye becomes hello' },
  ];
  let lastLabel = '';
  function updateLabel(phase) {
    const l = labels.find(L => phase < L.upTo);
    if (l && l.text !== lastLabel) {
      lastLabel = l.text;
      const el = document.getElementById('breathLabel');
      el.style.opacity = '0';
      setTimeout(() => { el.innerHTML = l.text; el.style.opacity = '1'; }, 220);
    }
  }

  // verse fade in/out
  const verse = document.getElementById('verse');
  setTimeout(() => verse.classList.add('show'), 800);
  setTimeout(() => verse.classList.remove('show'), 7500);

  const verses = [
    'the hello already carries the goodbye',
    'every farewell is a folded greeting',
    'the seed remembers the harvest',
    'we said hello already heavier than we knew',
    'goodbye is the hello, told in full',
    'each breath, both the leaving and the staying',
    'nothing leaves &mdash; it gathers',
    'the world begins again, slightly warmer',
  ];
  let verseIdx = 0;

  // float fragments — short words that drift up like embers, esp. on cycle change
  const floats = document.getElementById('floats');
  const fragments = [
    'hello', 'goodbye', 'still', 'again', 'here', 'gone',
    'returned', 'gathered', 'kept', 'held', 'released',
    '&mdash;', '·', 'and then', 'and again',
  ];

  function spawnFragment(word, x, y, opts = {}) {
    const el = document.createElement('div');
    el.className = 'float-text';
    el.innerHTML = word;
    const size = opts.size || (12 + Math.random() * 14);
    el.style.fontSize = size + 'px';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.opacity = '0';
    el.style.color = opts.color || 'rgba(244, 236, 220, 0.85)';
    floats.appendChild(el);

    const dx = (Math.random() - 0.5) * 80;
    const dy = -120 - Math.random() * 200;
    const dur = 4500 + Math.random() * 2500;

    el.animate(
      [
        { transform: `translate(0, 0)`, opacity: 0 },
        { transform: `translate(${dx * 0.3}px, ${dy * 0.2}px)`, opacity: 0.85, offset: 0.2 },
        { transform: `translate(${dx}px, ${dy}px)`, opacity: 0 },
      ],
      { duration: dur, easing: 'cubic-bezier(0.2, 0.6, 0.4, 1)' }
    );
    setTimeout(() => el.remove(), dur + 50);
  }

  function maybeFloat() {
    // on cycle change, spawn a verse change + a few fragments
    verse.classList.remove('show');
    setTimeout(() => {
      verseIdx = (verseIdx + 1) % verses.length;
      verse.innerHTML = verses[verseIdx];
      verse.classList.add('show');
    }, 1200);
    setTimeout(() => verse.classList.remove('show'), 8500);

    // burst of fragments from center
    const cx = W / 2, cy = H / 2;
    for (let i = 0; i < 6; i++) {
      const word = fragments[Math.floor(Math.random() * fragments.length)];
      setTimeout(() => {
        spawnFragment(word, cx + (Math.random() - 0.5) * 200, cy + (Math.random() - 0.5) * 100, {
          size: 14 + Math.random() * 10,
          color: i % 3 === 0 ? 'rgba(245, 201, 122, 0.9)' : 'rgba(244, 236, 220, 0.85)',
        });
      }, i * 380);
    }
  }

  // click (no drag) spawns small word fragment near click
  let downAt = 0, downX = 0, downY = 0;
  addEventListener('mousedown', e => { downAt = performance.now(); downX = e.clientX; downY = e.clientY; });
  addEventListener('mouseup', e => {
    const dt = performance.now() - downAt;
    const dd = Math.hypot(e.clientX - downX, e.clientY - downY);
    if (dt < 250 && dd < 8) {
      const word = fragments[Math.floor(Math.random() * fragments.length)];
      spawnFragment(word, e.clientX, e.clientY, {
        size: 13 + Math.random() * 8,
        color: 'rgba(245, 201, 122, 0.85)',
      });
    }
  });

})();
</script>
</body>
</html>
