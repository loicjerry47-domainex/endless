<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>hello, goodbye — DDUP · DOMAINEX</title>
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/assets/css/system.css" />
<style>
  html, body { height: 100%; overflow: hidden; }
  body { font-family: var(--mono); }

  canvas {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    display: block;
  }

  .ui {
    position: fixed; inset: 0;
    pointer-events: none;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 36px 40px;
  }

  .top {
    display: flex; justify-content: space-between; align-items: flex-start;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--dim);
  }

  .top .label {
    transition: color 600ms ease;
  }
  .top .label.active { color: var(--ink); }

  .top .scene-num {
    font-variant-numeric: tabular-nums;
  }

  .center {
    flex: 1;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center;
    padding: 0 8vw;
    position: relative;
  }

  .scene-title {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    font-size: clamp(48px, 8vw, 120px);
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--ink);
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 1.2s ease, transform 1.2s ease;
    margin-bottom: 28px;
  }
  .scene-title.show { opacity: 1; transform: translateY(0); }

  .scene-body {
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.9;
    letter-spacing: 0.02em;
    color: var(--dim);
    max-width: 540px;
    opacity: 0;
    transition: opacity 1.6s ease 0.4s;
  }
  .scene-body.show { opacity: 1; }

  .scene-body em {
    font-family: var(--serif);
    font-style: italic;
    font-size: 16px;
    color: var(--ink);
  }

  .bottom {
    display: flex; justify-content: space-between; align-items: flex-end;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em;
    color: var(--dim);
    pointer-events: auto;
  }

  .nav {
    display: flex; gap: 4px;
  }
  .nav button {
    pointer-events: auto;
    background: var(--glass-tint);
    -webkit-backdrop-filter: var(--glass-blur);
    backdrop-filter: var(--glass-blur);
    border: var(--glass-border);
    color: var(--dim);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 10px 16px;
    cursor: pointer;
    transition: color 350ms ease, background 350ms ease, border-color 350ms ease;
    border-radius: 9999px;
  }
  .nav button:hover { color: var(--ink); border-color: rgba(245, 201, 122, 0.4); }
  .nav button.active {
    color: var(--bg);
    background: var(--ink);
    border-color: var(--ink);
  }

  .hint {
    color: var(--faint);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-align: right;
    line-height: 1.6;
  }

  .progress {
    position: fixed;
    left: 40px; right: 40px;
    bottom: 100px;
    height: 1px;
    background: var(--faint);
    pointer-events: none;
  }
  .progress .fill {
    height: 100%;
    background: var(--ink);
    width: 0%;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .glyph {
    font-family: var(--mono);
    color: var(--warm);
    opacity: 0.7;
    font-size: 11px;
    letter-spacing: 0.15em;
    margin-bottom: 24px;
    opacity: 0;
    transition: opacity 1s ease;
  }
  .glyph.show { opacity: 0.7; }

  @media (max-width: 640px) {
    .ui { padding: 20px; }
    .top, .bottom { font-size: 10px; }
    .nav button { padding: 8px 10px; font-size: 9px; }
    .progress { left: 20px; right: 20px; bottom: 80px; }
  }
</style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="progress"><div class="fill" id="fill"></div></div>

  <div class="ui">
    <div class="top">
      <div class="label active" id="topL">a meditation in three states</div>
      <div class="scene-num" id="topR">01 / 03</div>
    </div>

    <div class="center">
      <div class="glyph" id="glyph">&gt;_</div>
      <h1 class="scene-title" id="title"></h1>
      <p class="scene-body" id="body"></p>
    </div>

    <div class="bottom">
      <div class="nav" id="nav">
        <button data-scene="0" class="active">hello</button>
        <button data-scene="1">in between</button>
        <button data-scene="2">goodbye</button>
      </div>
      <div class="hint">click anywhere<br/>to advance</div>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // ---------- particles ----------
  const N = 280;
  const particles = [];
  for (let i = 0; i < N; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = Math.random();
    particles.push({
      // current
      x: Math.cos(a) * r * 8,
      y: Math.sin(a) * r * 8,
      // target
      tx: 0, ty: 0,
      // velocity for damping
      vx: 0, vy: 0,
      // visual
      size: 0.6 + Math.random() * 1.4,
      hue: Math.random(),       // 0-1 used to mix warm
      phase: Math.random() * Math.PI * 2,
      seed: Math.random(),
    });
  }

  // scene assigners — set tx/ty based on scene + time
  function assignTargets(scene, t) {
    const cx = W / 2, cy = H / 2;
    const R = Math.min(W, H);

    if (scene === 0) {
      // HELLO WORLD: a single tight point with a faint breath
      for (let i = 0; i < N; i++) {
        const p = particles[i];
        const a = (i / N) * Math.PI * 2 + p.seed * 0.4;
        const breath = 4 + Math.sin(t * 0.0008 + p.phase) * 2;
        const r = breath * (0.4 + p.seed * 0.6);
        p.tx = cx + Math.cos(a) * r;
        p.ty = cy + Math.sin(a) * r;
      }
    } else if (scene === 1) {
      // IN BETWEEN: spreading constellation, organic drift
      for (let i = 0; i < N; i++) {
        const p = particles[i];
        const a = p.seed * Math.PI * 2 + t * 0.00005 * (p.hue - 0.5);
        const radius = (0.15 + p.seed * 0.55) * R * 0.55;
        const wobble = Math.sin(t * 0.0004 + p.phase) * 18 + Math.cos(t * 0.00027 + p.phase * 1.3) * 22;
        p.tx = cx + Math.cos(a) * radius + wobble;
        p.ty = cy + Math.sin(a) * radius * 0.78 + wobble * 0.6;
      }
    } else {
      // GOODBYE WORLD: dense gathered core, slow outward drift
      for (let i = 0; i < N; i++) {
        const p = particles[i];
        const a = p.seed * Math.PI * 2 + t * 0.00008;
        // gathered cluster but with a slow expansion of older ones
        const drift = (p.seed * t * 0.000018) % 1;
        const radius = (0.05 + p.seed * 0.18) * R * (0.6 + drift * 1.3);
        p.tx = cx + Math.cos(a) * radius;
        p.ty = cy + Math.sin(a) * radius * 0.95;
      }
    }
  }

  // ---------- render ----------
  let scene = 0;
  let lastSceneSwitch = performance.now();

  function lerpColor(t) {
    // ink → warm at t=1
    const ink = [242, 236, 225];
    const warm = [244, 201, 122];
    return [
      ink[0] + (warm[0] - ink[0]) * t,
      ink[1] + (warm[1] - ink[1]) * t,
      ink[2] + (warm[2] - ink[2]) * t,
    ];
  }

  function draw(now) {
    const t = now;
    assignTargets(scene, t);

    // trailing fade
    ctx.fillStyle = 'rgba(10, 9, 8, 0.18)';
    ctx.fillRect(0, 0, W, H);

    // damp toward targets
    for (let i = 0; i < N; i++) {
      const p = particles[i];
      const dx = p.tx - p.x;
      const dy = p.ty - p.y;
      p.vx = p.vx * 0.86 + dx * 0.012;
      p.vy = p.vy * 0.86 + dy * 0.012;
      p.x += p.vx;
      p.y += p.vy;
    }

    // connections — only in scene 1 (in between) — capped to nearby neighbours
    if (scene === 1) {
      ctx.lineWidth = 0.4;
      for (let i = 0; i < N; i++) {
        const a = particles[i];
        for (let j = i + 1; j < i + 16 && j < N; j++) {
          const b = particles[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < 9000) {
            const alpha = (1 - d2 / 9000) * 0.18;
            ctx.strokeStyle = `rgba(242, 236, 225, ${alpha})`;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }
    }

    // particles
    for (let i = 0; i < N; i++) {
      const p = particles[i];
      let warmth = 0;
      let alpha = 0.85;
      let size = p.size;

      if (scene === 0) {
        warmth = 0;
        alpha = 0.7 + Math.sin(t * 0.001 + p.phase) * 0.25;
        size = p.size * 1.2;
      } else if (scene === 1) {
        warmth = 0.1 * p.hue;
        alpha = 0.5 + p.hue * 0.4;
      } else {
        warmth = 0.4 + p.hue * 0.5;
        alpha = 0.6 + p.hue * 0.35;
        size = p.size * 1.4;
      }

      const [r, g, b] = lerpColor(warmth);
      ctx.fillStyle = `rgba(${r|0}, ${g|0}, ${b|0}, ${alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
      ctx.fill();

      // soft halo on goodbye
      if (scene === 2) {
        ctx.fillStyle = `rgba(${r|0}, ${g|0}, ${b|0}, ${alpha * 0.06})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, size * 6, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);

  // ---------- scenes ----------
  const scenes = [
    {
      glyph: '> _',
      title: 'hello, world',
      body: 'A single point of signal. The smallest possible proof that something is alive enough to address the void. <em>I am here. Are you?</em><br/><br/>Two words, weightless. Everything that follows will be the elaboration of this one breath.',
      label: 'the seed',
    },
    {
      glyph: '// running',
      title: 'the in&nbsp;between',
      body: 'The seed branches. Loops form. Errors caught. Features added at 4:32am. Connections nobody planned for.<br/><br/>This is where the mass accumulates &mdash; <em>where the hello earns its goodbye.</em>',
      label: 'the elaboration',
    },
    {
      glyph: '> end',
      title: 'goodbye, world',
      body: 'Everything the hello started, gathered. Not loss &mdash; <em>accounting.</em><br/><br/>The point of light returns, but heavier now, holding all of it. The richer the hello, the heavier &mdash; and more meaningful &mdash; the goodbye.',
      label: 'the harvest',
    },
  ];

  const titleEl = document.getElementById('title');
  const bodyEl = document.getElementById('body');
  const glyphEl = document.getElementById('glyph');
  const topR = document.getElementById('topR');
  const topL = document.getElementById('topL');
  const fillEl = document.getElementById('fill');
  const navButtons = document.querySelectorAll('#nav button');

  function setScene(i) {
    if (i === scene && performance.now() - lastSceneSwitch < 200) return;
    scene = i;
    lastSceneSwitch = performance.now();

    titleEl.classList.remove('show');
    bodyEl.classList.remove('show');
    glyphEl.classList.remove('show');

    setTimeout(() => {
      const s = scenes[i];
      titleEl.innerHTML = s.title;
      bodyEl.innerHTML = s.body;
      glyphEl.textContent = s.glyph;
      topL.textContent = s.label;
      topR.textContent = `0${i + 1} / 03`;
      fillEl.style.width = `${((i + 1) / 3) * 100}%`;

      titleEl.classList.add('show');
      bodyEl.classList.add('show');
      glyphEl.classList.add('show');

      navButtons.forEach((b, j) => b.classList.toggle('active', j === i));
    }, 350);
  }

  navButtons.forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      setScene(parseInt(btn.dataset.scene, 10));
    });
  });

  document.body.addEventListener('click', () => {
    setScene((scene + 1) % 3);
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ') setScene((scene + 1) % 3);
    if (e.key === 'ArrowLeft') setScene((scene + 2) % 3);
  });

  // initial
  setTimeout(() => setScene(0), 200);
})();
</script>
</body>
</html>
